body:
  text: 夫守真者淨淨為悟法之基培本者因因即現果之證西域之聖靈宣布而東土之妙諦迺得矣方大化之初流遐陬咸被其光洎金象之呈露智愚胥仰其暉是以豪眉之容飾于陽門紺髮之形圖諸夜臺逮皇魏受圖光宅崧洛篤信彌殷法教愈盛王公貴人舍眥財如脫屣樵豎牧奴視服役如歸市于是招提森列寶塔高聳金剎耀日宮殿暎月寫天上之姿模山中之影袈衣未啟士女之羅拜滿前經聲迭續檀越之參贊盈階粉飾莊嚴莫令為逾佛弟子常煥等以寺內有五級浮圖一塸建自永昌後因兵劫遂至巔仆雖屢加增葺絕少完繕今集眾同建庶臻永固非敢云不可稱量不可思議之功德直願恒河沙數同追斯福大魏孝昌二年歲次丙午八月庚辰朔四日癸未建訖鎮遠將軍洛州騎兵參軍常煥冠軍將軍并州刺史杜延浮圖主修梵寺法師曇印浮圖主胡統寺法師道顯浮圖主景明寺法師雲淨浮圖主莊嚴寺法師法悟唯那主譚庚常印栢年唯那主劉遷邊紹江尚唯那主古啟祖任
